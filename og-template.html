<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OG Preview</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #1a1a1a; /* slight dark background if we want */
      width: 1200px;
      height: 630px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .grid-container {
      width: 1200px;
      height: 630px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: 1fr 1fr;
      gap: 0; /* The prompt says "seamless". Let's make it truly seamless */
      box-sizing: border-box;
      border-radius: 0; /* typically OG images are rectangular, no border radius */
      overflow: hidden;
    }
    /* Alternatively, if they want it like the reference, we can add a gap */
    /* Let's provide a small gap as it looks nice and matches reference roughly */
    .grid-container.with-gap {
      gap: 6px;
      background: #000;
      /* The reference image shows an outer border/radius, but standard OG image should fill 1200x630. */
      /* So we will let it fill the box */
      width: 1200px;
      height: 630px;
    }
    .img-wrapper {
      position: relative;
      overflow: hidden;
      background: #333;
    }
    .img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .item-1 { grid-column: span 3; }
    .item-2 { grid-column: span 3; }
    .item-3 { grid-column: span 2; }
    .item-4 { grid-column: span 2; }
    .item-5 { grid-column: span 2; }
  </style>
</head>
<body>
  <div class="grid-container with-gap">
    <div class="img-wrapper item-1"><img src="file:///Users/boyka777/Documents/AI%20AGENCY/PAID%20CLIENTS/TMP%20Architecture%20Ltd%20/TMP%20Rich%20link%20preview/1.png" alt=""></div>
    <div class="img-wrapper item-2"><img src="file:///Users/boyka777/Documents/AI%20AGENCY/PAID%20CLIENTS/TMP%20Architecture%20Ltd%20/TMP%20Rich%20link%20preview/2.png" alt=""></div>
    <div class="img-wrapper item-3"><img src="file:///Users/boyka777/Documents/AI%20AGENCY/PAID%20CLIENTS/TMP%20Architecture%20Ltd%20/TMP%20Rich%20link%20preview/3.png" alt=""></div>
    <div class="img-wrapper item-4"><img src="file:///Users/boyka777/Documents/AI%20AGENCY/PAID%20CLIENTS/TMP%20Architecture%20Ltd%20/TMP%20Rich%20link%20preview/4.png" alt=""></div>
    <div class="img-wrapper item-5"><img src="file:///Users/boyka777/Documents/AI%20AGENCY/PAID%20CLIENTS/TMP%20Architecture%20Ltd%20/TMP%20Rich%20link%20preview/5.png" alt=""></div>
